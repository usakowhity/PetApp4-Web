<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PetApp4-Web (Myu Edition)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts（猫っぽい丸文字） -->
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe FaceMesh（CDN版） -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

  <div id="app">

    <!-- 猫語検定協会（会長：Myu）公認 -->
    <div id="rank-box">
      <div id="rank">猫語検定協会（会長：Myu）公認</div>
      <div id="points">猫語検定 5級 <span class="paws">🐾</span></div>
    </div>

    <!-- 猫画像（状態切り替え） -->
    <div id="cat-box">
      <img id="pet-image" src="assets/images/myu_neutral.png" alt="Myu">
    </div>

  </div>

  <!-- メインロジック -->
  <script src="main.js"></script>

</body>
</html>
