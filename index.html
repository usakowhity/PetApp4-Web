<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PetApp4-Web (Myu Edition)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/images/favicon.ico">

  <!-- MediaPipe FaceMesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

  <div id="app">

    <div id="rank-box">
      <div id="rank">猫語検定協会（会長：Myu）公認</div>
      <div id="points">猫語検定 5級 <span class="paws">🐾</span></div>
    </div>

    <!-- FaceMesh用ビデオ（非表示扱い） -->
    <video id="video" autoplay playsinline
           style="width:1px;height:1px;opacity:0;position:absolute;left:-9999px;"></video>

    <!-- Myu画像 -->
    <div id="cat-box">
      <img id="myu" src="assets/images/myu_neutral.png" alt="Myu">
    </div>

    <!-- 共通猫鳴き（キャリブレーション＋Affection） -->
    <audio id="cat_mew_audio" src="assets/audio/cat_mew.wav"></audio>

  </div>

  <script src="main.js" defer></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      setState("neutral");
      startFaceMesh();
      startAudio();
      calibrateCatVoice();   // ★ キャリブレーション開始（解析のみ）
    });
  </script>

</body>
</html>
